# Taken from https://github.com/zerowidth/gh-md
matches:
  - trigger: "//md"
    replace: "{{output}}"
    vars:
      - name: clipboard
        type: clipboard
      - name: output
        type: shell
        params:
          shell: bash
          cmd: "PATH=$PATH:$HOME/.local/share/mise/shims $HOME/.local/share/mise/shims/gh md link {{clipboard}}"
  - trigger: "//ml"
    replace: "{{output}}"
    vars:
      - name: clipboard
        type: clipboard
      - name: output
        type: shell
        params:
          shell: bash
          cmd: "PATH=$PATH:$HOME/.local/share/mise/shims $HOME/.local/share/mise/shims/gh md link --simple {{clipboard}}"
  - trigger: "//mr"
    replace: "{{output}}"
    vars:
      - name: clipboard
        type: clipboard
      - name: output
        type: shell
        params:
          shell: bash
          cmd: "PATH=$PATH:$HOME/.local/share/mise/shims $HOME/.local/share/mise/shims/gh md ref {{clipboard}}"
